<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>evil0618</title>
  <meta name="description" content="evil0618 — 个人主页与链接导航">
  <meta property="og:title" content="evil0618">
  <meta property="og:description" content="个人主页与链接导航">
  <meta property="og:type" content="website">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
  <main>
    <!-- Hero Section -->
    <section id="hero" class="hero" aria-label="个人介绍">
      <div class="hero__bg" aria-hidden="true"></div>
      <div class="hero__overlay" aria-hidden="true"></div>
      <div class="hero__content">
        <p class="hero__tagline animate-on-load">Hello, World</p>
        <h1 class="hero__name animate-on-load">evil0618</h1>
        <p class="hero__bio animate-on-load">热爱技术与创造，探索数字世界的无限可能</p>
        <div class="hero__meta animate-on-load">
          <span class="hero__meta-item">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            06.05
          </span>
          <span class="hero__meta-divider"></span>
          <span class="hero__meta-item">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
            双子座
          </span>
        </div>
      </div>
      <div class="hero__scroll-hint" aria-hidden="true">
        <div class="scroll-line"></div>
      </div>
    </section>

    <!-- Links Hub -->
    <section id="links" class="links" aria-label="链接导航">
      <div class="links__glow" aria-hidden="true"></div>
      <div class="links__container">
        <h2 class="links__title animate-on-scroll">Navigate</h2>
        <div class="links__groups" id="linksGroups">
          <!-- 由 JS 动态渲染 -->
        </div>
      </div>
    </section>
  </main>

  <!-- Contact Modal -->
  <div class="modal-overlay" id="contactModal" aria-hidden="true">
    <div class="modal-card">
      <button class="modal-close" id="modalClose" aria-label="关闭">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>

      <!-- Auth Gate -->
      <div class="modal-auth" id="modalAuth">
        <div class="modal-auth__icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </div>
        <p class="modal-auth__title">私密内容</p>
        <p class="modal-auth__desc">请输入授权码以查看联系方式</p>
        <div class="modal-auth__form">
          <input type="text" class="modal-auth__input" id="authInput" placeholder="输入授权码" maxlength="10" autocomplete="off">
          <button class="modal-auth__btn" id="authSubmit">验证</button>
        </div>
        <p class="modal-auth__error" id="authError"></p>
      </div>

      <!-- Authenticated Content -->
      <div class="modal-content" id="modalContent" style="display:none;">
        <div class="modal-content__header">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          <span>联系方式</span>
        </div>

        <!-- Phone -->
        <div class="modal-contact-row">
          <div class="modal-contact-row__icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          </div>
          <span class="modal-contact-row__label">手机</span>
          <span class="modal-contact-row__value">173-7668-9927</span>
        </div>

        <!-- QR Code -->
        <div class="modal-qr">
          <p class="modal-qr__label">微信二维码</p>
          <div class="modal-qr__img-wrap">
            <img src="wechat.jpg" alt="微信二维码" class="modal-qr__img" loading="lazy">
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="footer__inner">
      <p class="footer__copy">&copy; 2026 evil0618</p>
      <button class="footer__theme-toggle" id="themeToggle" aria-label="切换主题">
        <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
      <p class="footer__wallpaper-info" id="wallpaperInfo"></p>
    </div>
  </footer>

  <script src="script.js?v=2"></script>
</body>
</html>
