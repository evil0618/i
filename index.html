<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>evil0618</title>
  <meta name="description" content="evil0618 — 个人主页与链接导航">
  <meta property="og:title" content="evil0618">
  <meta property="og:description" content="个人主页与链接导航">
  <meta property="og:type" content="website">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <!-- Hero Section -->
    <section id="hero" class="hero" aria-label="个人介绍">
      <div class="hero__bg" aria-hidden="true"></div>
      <div class="hero__overlay" aria-hidden="true"></div>
      <div class="hero__content">
        <p class="hero__tagline animate-on-load">Hello, World</p>
        <h1 class="hero__name animate-on-load">evil0618</h1>
        <p class="hero__bio animate-on-load">热爱技术与创造，探索数字世界的无限可能</p>
      </div>
      <div class="hero__scroll-hint" aria-hidden="true">
        <div class="scroll-line"></div>
      </div>
    </section>

    <!-- Links Hub -->
    <section id="links" class="links" aria-label="链接导航">
      <div class="links__glow" aria-hidden="true"></div>
      <div class="links__container">
        <h2 class="links__title animate-on-scroll">Navigate</h2>
        <div class="links__groups" id="linksGroups">
          <!-- 由 JS 动态渲染 -->
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="footer__inner">
      <p class="footer__copy">&copy; 2026 evil0618</p>
      <button class="footer__theme-toggle" id="themeToggle" aria-label="切换主题">
        <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
      <p class="footer__wallpaper-info" id="wallpaperInfo"></p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
